  <script type="text/babel" data-presets="env,react">

  // ------------------------------
  // Google Sheet backend service
  // ------------------------------
  const GS_ENDPOINT = "https://script.google.com/macros/s/AKfycbyAKILwCdBfjUjGh7aYSJXmrtltGKhBITUsYBwHc0rBltmhcwvF2VVkhDk5UV-znXGu/exec";

  async function postJSONSimple(url, payload) {
    const r = await fetch(url, { method: "POST", body: JSON.stringify(payload) });
    const text = await r.text();
    let j;
    try { j = JSON.parse(text); }
    catch { throw new Error("Non-JSON response from script: " + text.slice(0,120)); }
    return j;
  }

  const GSSvc = {
    async fetchAll() {
      const r = await fetch(`${GS_ENDPOINT}?action=fetchAll`);
      const j = await r.json();
      if (!j.ok) throw new Error(j.error || "fetchAll failed");

      const products = (j.data.products || []).map(p => ({
        ...p,
        price: Number(p.price) || 0,
        cost: Number(p.cost) || 0,
        stock: Number(p.stock) || 0,
        lowStock: Number(p.lowStock) || 0,
        createdAt: p.createdAt || p.created_at || null,
        updatedAt: p.updatedAt || p.updated_at || null,
        stockHistory: (() => {
          try {
            const raw =
              p.stockHistory_json ??
              p.stock_history_json ??
              p.stockHistory ??
              "[]";
            return Array.isArray(raw) ? raw : JSON.parse(raw);
          } catch { return []; }
        })(),
      }));

      const sales = (j.data.sales || []).map(s => ({
        ...s,
        total: Number(s.total) || 0,
        items: (() => {
          try { return JSON.parse(s.items_json || "[]"); }
          catch { return []; }
        })(),
      }));

      const expenses = (j.data.expenses || []).map(e => ({
        ...e,
        amount: Number(e.amount) || 0
      }));

      const years = j.data.years || [];
      return { products, sales, expenses, years };
    },

    async saveProducts(products) {
      const payload = products.map(p => ({
        ...p,
        stockHistory_json: JSON.stringify(p.stockHistory || []),
      }));
      const j = await postJSONSimple(GS_ENDPOINT, { action: "saveProducts", products: payload });
      if (!j.ok) throw new Error(j.error || "saveProducts failed");
    },

    async addSale(sale) {
      const j = await postJSONSimple(GS_ENDPOINT, { action: "addSale", sale });
      if (!j.ok) throw new Error(j.error || "addSale failed");
    },

    async addExpense(expense) {
      const j = await postJSONSimple(GS_ENDPOINT, { action: "addExpense", expense });
      if (!j.ok) throw new Error(j.error || "addExpense failed");
    },

    async deleteProduct(id) {
      const j = await postJSONSimple(GS_ENDPOINT, { action: "deleteProduct", id });
      if (!j.ok) throw new Error(j.error || "deleteProduct failed");
    },

    async saveYears(years){
      const j = await postJSONSimple(GS_ENDPOINT, { action:"saveyears", years });
      if(!j.ok) throw new Error(j.error || "saveYears failed");
    },
  };

  // ------------------------------
  // Helpers & Storage
  // ------------------------------
  const LS_KEY = "monicz_exclusive_app_v1";
  const nowISO = () => new Date().toISOString();

  const fmt = (n) =>
    Number.isFinite(Number(n))
      ? Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })

  function loadState() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      delete parsed.historicalYears;
      return parsed;
    } catch {
      return null;
    }
  }

  function saveState(state) {
    const copy = { ...state };
    delete copy.historicalYears;
    localStorage.setItem(LS_KEY, JSON.stringify(copy));
  }

  function uid(prefix = "id") {
    return `${prefix}_${Math.random().toString(36).slice(2, 9)}`;
  }

  function getCartDraftItemCount(username) {
    try {
      const key = `monicz_exclusive_cart_draft_${String(username || "unknown").toLowerCase()}`;
      const raw = localStorage.getItem(key);
      if (!raw) return 0;
      const parsed = JSON.parse(raw);
      const cart = Array.isArray(parsed?.cart) ? parsed.cart : [];
      return cart.reduce((sum, it) => sum + Math.max(0, Number(it?.qty) || 0), 0);
    } catch {
      return 0;
    }
  }

  function withinDays(iso, days) {
    const then = new Date(iso).getTime();
    const diff = Date.now() - then;
    return diff <= days * 24 * 60 * 60 * 1000;
  }

  function niceDateTime(iso) {
    if (!iso) return "";
    try { return new Date(iso).toLocaleString(); } catch { return String(iso); }
  }

  function toNum(v) {
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }

  function dateOnlyFromISO(iso) {
    try {
      const d = new Date(iso);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    } catch {
      return "";
    }
  }

  function startOfToday() {
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  }

  function startOfWeek(date = new Date()) {
    const d = new Date(date);
    d.setHours(0,0,0,0);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    return d;
  }

  function endOfWeek(date = new Date()) {
    const d = startOfWeek(date);
    d.setDate(d.getDate() + 7);
    d.setMilliseconds(-1);
    return d;
  }

  function startOfMonth(date = new Date()) {
    return new Date(date.getFullYear(), date.getMonth(), 1, 0,0,0,0);
  }

  function endOfMonth(date = new Date()) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0, 23,59,59,999);
  }

  function getISOWeekString(date = new Date()) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
    return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2,"0")}`;
  }

  function getDateRangeFromWeekString(weekStr) {
    if (!weekStr) return { start: null, end: null };
    const [yearStr, weekPart] = weekStr.split("-W");
    const year = Number(yearStr);
    const week = Number(weekPart);
    if (!year || !week) return { start: null, end: null };

    const simple = new Date(year, 0, 1 + (week - 1) * 7);
    const dow = simple.getDay();
    const monday = new Date(simple);
    if (dow <= 4 && dow !== 0) monday.setDate(simple.getDate() - simple.getDay() + 1);
    else if (dow === 0) monday.setDate(simple.getDate() - 6);
    else monday.setDate(simple.getDate() + 8 - simple.getDay());
    monday.setHours(0,0,0,0);

    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);

    return { start: monday, end: sunday };
  }

  // CSV
  function csvStringify(rows) {
    if (!rows || !rows.length) return "";
    const headers = Object.keys(rows[0]);
    const esc = (v) => {
      const s = v == null ? "" : String(v);
      if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    return [headers.join(","), ...rows.map((r) => headers.map((h) => esc(r[h])).join(","))].join("\n");
  }

  function csvParse(text) {
    const rows = [];
    let i = 0, field = '', row = [], inQuotes = false;
    function pushField() { row.push(field); field = ''; }
    function pushRow() { rows.push(row); row = []; }
    while (i < text.length) {
      const c = text[i++];
      if (inQuotes) {
        if (c === '"') {
          if (text[i] === '"') { field += '"'; i++; }
          else { inQuotes = false; }
        } else field += c;
      } else {
        if (c === '"') inQuotes = true;
        else if (c === ',') pushField();
        else if (c === '\n') { pushField(); pushRow(); }
        else if (c === '\r') {}
        else field += c;
      }
    }
    pushField(); pushRow();
    if (rows.length && rows[rows.length - 1].every((x) => x === '')) rows.pop();
    return rows;
  }

  function csvToObjects(text) {
    const matrix = csvParse(text);
    if (!matrix.length) return [];
    const headers = matrix[0].map((h) => h.trim());
    return matrix.slice(1).map((cells) => {
      const obj = {};
      headers.forEach((h, idx) => (obj[h] = (cells[idx] ?? '').trim()));
      return obj;
    });
  }

  // ------------------------------
  // Hash routing
  // ------------------------------
  function parseHash() {
    const raw = (window.location.hash || "").replace(/^#/, "");
    if (!raw || raw === "/") return { name: "main" };
    const parts = raw.split("/").filter(Boolean);
    if (parts[0] === "edit-product" && parts[1]) return { name: "edit-product", id: parts[1] };
    return { name: "main" };
  }

  function goHash(path) {
    window.location.hash = path;
  }

  // ------------------------------
  // Seed Data
  // ------------------------------
  const initialState = {
    users: [
      { username: "admin", role: "admin", password: "monicamylove" },
      { username: "client", role: "client", password: "client123" },
    ],
    currentUser: null,
    products: [],
    sales: [],
    expenses: [],
    historicalYears: [],
    settings: { currency: "₦", lowStockDefault: 10 },
    returnTab: null,
  };

  // ------------------------------
  // UI Components
  // ------------------------------
  function Card({ title, icon, children, className = "" }) {
    const Icon = icon || Package;
    return (

  function Button({ title, children, onClick, variant = "primary", className = "", type = "button", disabled=false }) {
    const styles =
      variant === "ghost"
        ? "bg-transparent hover:bg-slate-800 border border-slate-600 text-white"
        : variant === "danger"
        ? "bg-red-600 hover:bg-red-700 text-white"
        : variant === "secondary"
        ? "bg-slate-700 hover:bg-slate-800 text-white"
        : "bg-blue-600 hover:bg-blue-700 text-white";
    return (
      <button
        disabled={disabled}
        type={type}
        onClick={onClick}
        className={`px-3 py-2 rounded-xl text-sm font-medium ${styles} ${disabled ? "opacity-60 cursor-not-allowed" : ""} ${className}`}
      >
        {children || title}
      </button>
    );
  }

  function NumberInput({ label, value, onChange, placeholder = "", className = "", step, min, liveUpdate = false }) {
    const [focused, setFocused] = useState(false);
    const [text, setText] = useState("");

    useEffect(() => {
      if (!focused) {
        const n = Number(value);
        setText(Number.isFinite(n) ? String(n) : "0");
      }
    }, [value, focused]);

    function handleFocus() {
      setFocused(true);
      const n = Number(value);
      if (!Number.isFinite(n) || n === 0) setText("");
    }
    function handleBlur() {
      setFocused(false);
      const raw = String(text ?? "").trim();
      const n = raw === "" ? 0 : Number(raw);
      onChange(Number.isFinite(n) ? n : 0);
    }

    function handleChange(e) {
      const raw = e.target.value;
      setText(raw);
      if (!liveUpdate) return;
      const trimmed = String(raw ?? "").trim();
      if (trimmed === "") return onChange(0);
      const n = Number(trimmed);
      if (Number.isFinite(n)) onChange(n);
    }

    return (
      <label className={`block ${className}`}>
        <span className="text-xs text-gray-300">{label}</span>
        <input
          type="number"
          step={step}
          min={min}
          className="mt-1 w-full rounded-xl border border-slate-600 bg-[#1E1E1E] text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          value={focused ? text : (Number(value) === 0 ? "" : text)}
          placeholder={placeholder}
          onFocus={handleFocus}
          onBlur={handleBlur}
          onChange={handleChange}
        />
      </label>
    );
  }

  function TextInput({ label, value, onChange, type = "text", placeholder = "", className = "" }) {
    return (
      <label className={`block ${className}`}>
        <span className="text-xs text-gray-300">{label}</span>
        <input
          type={type}
          className="mt-1 w-full rounded-xl border border-slate-600 bg-[#1E1E1E] text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
          value={value}
          placeholder={placeholder}
          onChange={(e) => onChange(e.target.value)}
        />

    );
  }

  function Table({ columns, rows, empty = "No data", rowClassName }) {
    return (

                      {typeof c.render === "function" ? c.render(r) : r[c.key]}

                  ))}

              ))

        </table>

    );

  // ------------------------------
  // App Root
  // ------------------------------
  function App() {
    const [state, setState] = useState(() => loadState() || initialState);
    const [booted, setBooted] = useState(false);
    const [route, setRoute] = useState(() => parseHash());

    useEffect(() => saveState(state), [state]);

    useEffect(() => {
      const onHash = () => setRoute(parseHash());
      window.addEventListener("hashchange", onHash);
      return () => window.removeEventListener("hashchange", onHash);
    }, []);

    useEffect(() => {
      (async () => {
        try {
          const remote = await GSSvc.fetchAll();
          setState(s => ({
            ...s,
            products: remote.products,
            sales: remote.sales,
            expenses: remote.expenses,
            historicalYears: remote.years || []
          }));
        } catch (e) {
          console.warn("Using local data (could not reach Database):", e);
        } finally {
          setBooted(true);
        }
      })();
    }, []);

    if (!booted) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-[#1E1E1E] text-white">
          <div className="text-center">
            <div className="text-5xl font-extrabold tracking-widest animate-pulse">
              MONICZ EXCLUSIVE
            </div>
            <div className="mt-4 text-lg text-gray-400">
              Inventory & Sales System
            </div>
            <div className="mt-8 flex justify-center">
              <div className="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
          </div>
        </div>
      );
    }

    function login(username, password) {
      const u = username.trim().toLowerCase();
      const found = state.users.find((usr) => usr.username.toLowerCase() === u && usr.password === password);
      if (found) setState((s) => ({ ...s, currentUser: { username: found.username, role: found.role } }));
      else alert("Invalid credentials");
    }

    function logout() {
      setState((s) => ({ ...s, currentUser: null }));
      goHash("/");
    }

    if (!state.currentUser) return <Login onLogin={login} />;

    if (route.name === "edit-product") {
      return (
        <div className="min-h-screen bg-[#1E1E1E] text-white">
          <TopBar user={state.currentUser} onLogout={logout} />
          <div className="max-w-6xl mx-auto px-4 py-6">
            <EditProductPage
              state={state}
              setState={setState}
              productId={route.id}
              canDelete={state.currentUser.role === "admin"}
              onBack={() => {
                setState((s) => ({ ...s, returnTab: "products" }));
                goHash("/");
              }}
            />
          </div>
        </div>
      );
    }

    return (
      <div className="min-h-screen bg-[#1E1E1E] text-white">
        <TopBar user={state.currentUser} onLogout={logout} />
        {state.currentUser.role === "admin" ? (
          <AdminApp
            state={state}
            setState={setState}
            returnTab={state.returnTab}
            clearReturnTab={() => setState((s) => ({ ...s, returnTab: null }))}
          />
        ) : (
          <ClientApp state={state} setState={setState} />
        )}
      </div>
    );
  }

      <button
        onClick={onClick}

        }`}

      </button>
    );

  // Admin App
  // ------------------------------
  function AdminApp({ state, setState, returnTab, clearReturnTab }) {
    const [tab, setTab] = useState("dashboard");
    const [cartBadgeCount, setCartBadgeCount] = useState(() => getCartDraftItemCount(state.currentUser?.username));
    const { products, sales, expenses, settings } = state;

    const totals = useMemo(() => {
      const today = sales.filter((s) => withinDays(s.date, 1)).reduce((a, s) => a + s.total, 0);
      const week = sales.filter((s) => withinDays(s.date, 7)).reduce((a, s) => a + s.total, 0);
      const month = sales.filter((s) => withinDays(s.date, 30)).reduce((a, s) => a + s.total, 0);
      const inventoryValue = products.reduce((a, p) => a + (p.price || 0) * (p.stock || 0), 0);
      const revenue = sales.reduce((a, s) => a + s.total, 0);
      const cogs = sales.reduce((acc, s) => acc + (s.items || []).reduce((aa, it) => aa + (it.qty * (it.cost || 0)), 0), 0);
      const salesProfit = revenue - cogs;
      const expenseTotal = expenses.reduce((a, e) => a + (Number(e.amount) || 0), 0);
      const netProfit = salesProfit - expenseTotal;
      const lowStock = products.filter((p) => (p.stock || 0) <= (p.lowStock || settings.lowStockDefault));
      return { today, week, month, inventoryValue, revenue, cogs, salesProfit, expenseTotal, netProfit, lowStock };
    }, [products, sales, expenses, settings.lowStockDefault]);

    useEffect(() => {
      if (returnTab) {
        setTab(returnTab);
        clearReturnTab?.();
      }
    }, [returnTab, clearReturnTab]);

    useEffect(() => {
      function refreshCount() {
        setCartBadgeCount(getCartDraftItemCount(state.currentUser?.username));
      }
      refreshCount();
      window.addEventListener("cart-draft-updated", refreshCount);
      window.addEventListener("focus", refreshCount);
      return () => {
        window.removeEventListener("cart-draft-updated", refreshCount);
        window.removeEventListener("focus", refreshCount);
      };
    }, [state.currentUser?.username]);

    return (
      <div className="max-w-6xl mx-auto px-4 py-6">
        <nav className="grid grid-cols-2 gap-2 mb-4 sm:flex sm:flex-wrap">
          <TabButton icon={BarChart3} label="Dashboard" active={tab === "dashboard"} onClick={() => setTab("dashboard")} />
          <TabButton icon={Package} label="Products" active={tab === "products"} onClick={() => setTab("products")} />
          <TabButton
            icon={ShoppingCart}
            label={
              <span className="inline-flex items-center gap-2">
                <span>Record Sale</span>
                {cartBadgeCount > 0 && (
                  <span className="inline-flex items-center justify-center min-w-[20px] h-5 px-1 rounded-full bg-yellow-300 text-black text-[11px] font-bold">
                    {cartBadgeCount}
                  </span>
                )}
              </span>
            }
            active={tab === "sell"}
            onClick={() => setTab("sell")}
          />
          <TabButton icon={History} label="Sales History" active={tab === "sales"} onClick={() => setTab("sales")} />
          <TabButton icon={Wallet} label="Expenses" active={tab === "expenses"} onClick={() => setTab("expenses")} />
          <TabButton icon={FileText} label="Reports" active={tab === "reports"} onClick={() => setTab("reports")} />
        </nav>

        {tab === "dashboard" && (
          <div className="grid md:grid-cols-2 gap-4">
            <Card title="Sales Summary" icon={BarChart3}>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-center">
                <KPI label="Today" value={`${settings.currency}${fmt(totals.today)}`} />
                <KPI label="This Week" value={`${settings.currency}${fmt(totals.week)}`} />
                <KPI label="This Month" value={`${settings.currency}${fmt(totals.month)}`} />
              </div>
            </Card>
            <Card title="Inventory & Profit" icon={Wallet}>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 text-center">
                <KPI label="Inventory Value" value={`${settings.currency}${fmt(totals.inventoryValue)}`} />
                <KPI label="Sales Profit" value={`${settings.currency}${fmt(totals.salesProfit)}`} />
                <KPI label="Net Profit" value={`${settings.currency}${fmt(totals.netProfit)}`} />
              </div>
              <div className="text-xs text-slate-400 mt-2 text-center">
                Revenue: {settings.currency}{fmt(totals.revenue)} • COGS: {settings.currency}{fmt(totals.cogs)} • Expenses: {settings.currency}{fmt(totals.expenseTotal)}
              </div>
            </Card>
            <Card title="Low Stock Alerts" icon={AlertTriangle} className="md:col-span-2">
              <Table
                columns={[
                  { key: "name", title: "Product" },
                  { key: "stock", title: "Stock" },
                  { key: "low", title: "Min" },
                ]}
                rows={totals.lowStock.map((p) => ({
                  name: p.name,
                  stock: p.stock,
                  low: p.lowStock || settings.lowStockDefault
                }))}
                empty="No low stock items"
              />
            </Card>
          </div>
        )}

        {tab === "products" && <ProductsPanel state={state} setState={setState} canDelete={true} />}
        {tab === "sell" && <RecordSalePanel state={state} setState={setState} />}
        {tab === "sales" && <SalesHistoryPanel state={state} />}
        {tab === "expenses" && <ExpensesPanel state={state} setState={setState} onlyMine={false} />}

  // ------------------------------
  // Products Panel
  // ------------------------------
  function ProductsPanel({ state, setState, canDelete }) {
    const [form, setForm] = useState({
      name: "",
      category: "",
      price: 0,
      cost: 0,
      stock: 0,
      lowStock: state.settings.lowStockDefault,
    });

    const [bulk, setBulk] = useState("");
    const [invQuery, setInvQuery] = useState("");
    const fileRef = useRef(null);

    const filteredProducts = useMemo(() => {
      const q = invQuery.trim().toLowerCase();
      if (!q) return state.products;
      const terms = q.split(/\s+/).filter(Boolean);
      return state.products.filter((p) => {
        const hay = [
          p.name ?? "",
          p.category ?? "",
          String(p.price ?? ""),
          String(p.cost ?? ""),
          String(p.stock ?? "")
        ].join(" ").toLowerCase();
        return terms.every((t) => hay.includes(t));
      });
    }, [state.products, invQuery]);

    function normalizeNewProduct(base) {
      const createdAt = nowISO();
      const initialStock = Math.max(0, toNum(base.stock));
      const user = state.currentUser?.username || "unknown";
      const baseCost = toNum(base.cost);

      return {
        id: uid("p"),
        name: String(base.name || "").trim(),
        category: String(base.category || "").trim(),
        price: toNum(base.price),
        cost: baseCost,
        stock: initialStock,
        lowStock: toNum(base.lowStock) || state.settings.lowStockDefault,
        createdAt,
        updatedAt: createdAt,
        stockHistory: initialStock > 0 ? [{
          dateTime: createdAt,
          user,
          qtyChange: initialStock,
          note: "Initial stock",
          fromStock: 0,
          toStock: initialStock,
          type: "purchase",
          purchaseDate: dateOnlyFromISO(createdAt),
          unitCost: baseCost,
          totalCost: initialStock * baseCost
        }] : [],
      };
    }

    async function addProduct(e) {
      e.preventDefault();
      if (!form.name) return alert("Name required");

      const newP = normalizeNewProduct(form);

      let nextProducts;
      setState((s) => {
        nextProducts = [...s.products, newP];
        return { ...s, products: nextProducts };
      });

      try {
        await GSSvc.saveProducts(nextProducts);
        alert("Product added");
      } catch (err) {
        showSyncError("Sync to Database (saveProducts)", err);
      }

      setForm({
        name: "",
        category: "",
        price: 0,
        cost: 0,
        stock: 0,
        lowStock: state.settings.lowStockDefault
      });
    }

    function editProduct(p) {
      goHash(`/edit-product/${p.id}`);
    }

    async function delProduct(id) {
      if (!canDelete) return;
      if (!confirm("Delete product?")) return;

      const next = state.products.filter((p) => p.id !== id);
      setState((s) => ({ ...s, products: next }));

      try {
        await GSSvc.deleteProduct(id);
      } catch (err) {
        showSyncError("Sync to Database (deleteProduct)", err);
      }
    }

    function upsertProducts(existing, incoming) {
      const byName = new Map(existing.map((p) => [String(p.name || "").toLowerCase(), p]));
      const next = [...existing];

      for (const inc of incoming) {
        const key = String(inc.name || "").toLowerCase();
        if (!key) continue;

        if (byName.has(key)) {
          const idx = next.findIndex((p) => String(p.name || "").toLowerCase() === key);
          const existingP = next[idx];
          next[idx] = {
            ...existingP,
            ...inc,
            id: existingP.id,
            updatedAt: nowISO(),
            stockHistory: Array.isArray(existingP.stockHistory) ? existingP.stockHistory : []
          };
        } else {
          next.push(inc);
        }
      }
      return next;
    }

    async function parseBulk() {
      const lines = bulk.split(/\n|\r/).map((l) => l.trim()).filter(Boolean);
      const parsed = [];

      for (const line of lines) {
        const parts = line.split(",").map((s) => s.trim());
        const name = parts[0] || "";
        if (!name) continue;

        const category = parts[1] || "";
        const price = toNum(parts[2] || "0");
        const stock = toNum(parts[3] || "0");
        const low = toNum(parts[4] || String(state.settings.lowStockDefault)) || state.settings.lowStockDefault;
        const cost = toNum(parts[5] || "0");

        parsed.push(normalizeNewProduct({ name, category, price, stock, lowStock: low, cost }));
      }

      if (!parsed.length) return alert("No valid lines found.");

      let nextProducts;
      setState((s) => {
        nextProducts = upsertProducts(s.products, parsed);
        return { ...s, products: nextProducts };
      });

      setBulk("");

      try {
        await GSSvc.saveProducts(nextProducts);
        alert(`Imported ${parsed.length} products (merged by name).`);
      } catch (err) {
        showSyncError("Sync to Database (saveProducts after parseBulk)", err);
      }
    }

    function handleImportFile(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();

      reader.onload = async () => {
        try {
          const text = String(reader.result || "");
          const objs = csvToObjects(text);
          if (!objs.length) return alert("CSV appears empty.");

          const normalized = objs.map((o) => {
            const name = (o.name || o.Name || o.product || o.Product || "").trim();
            const category = (o.category || o.Category || "").trim();
            const price = toNum(o.price ?? o.Price ?? 0);
            const cost = toNum(o.cost ?? o.Cost ?? 0);
            const stock = toNum(o.stock ?? o.Stock ?? 0);
            const lowStock = toNum(o.lowStock ?? o.LowStock ?? o.min ?? o.Min ?? state.settings.lowStockDefault) || state.settings.lowStockDefault;
            if (!name) return null;
            return normalizeNewProduct({ name, category, price, cost, stock, lowStock });
          }).filter(Boolean);

          if (!normalized.length) return alert("No valid rows with a 'name' column.");

          let nextProducts;
          setState((s) => {
            nextProducts = upsertProducts(s.products, normalized);
            return { ...s, products: nextProducts };
          });

          try {
            await GSSvc.saveProducts(nextProducts);
            alert(`Imported ${normalized.length} products (merged by name).`);
          } catch (err) {
            showSyncError("Sync to Database (saveProducts after file import)", err);
          }
        } catch (err) {
          console.error(err);
          alert("Failed to import CSV. Please check the file format.");
        } finally {
          if (fileRef.current) fileRef.current.value = '';
        }
      };

      reader.readAsText(file);
    }

    function exportProducts() {
      const rows = state.products.map((p) => ({
        name: p.name,
        category: p.category,
        price: p.price,
        cost: p.cost || 0,
        stock: p.stock,
        lowStock: p.lowStock,
        createdAt: p.createdAt || "",
        updatedAt: p.updatedAt || "",
        stockHistory_json: JSON.stringify(p.stockHistory || [])
      }));
      const csv = csvStringify(rows);
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "products.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    return (
      <div className="grid lg:grid-cols-3 gap-4">
        <Card title="Add Product" icon={Package}>
          <form onSubmit={addProduct} className="grid gap-3">
            <TextInput label="Name" value={form.name} onChange={(v) => setForm((f) => ({ ...f, name: v }))} />
            <TextInput label="Category" value={form.category} onChange={(v) => setForm((f) => ({ ...f, category: v }))} />

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
              <NumberInput label="Price" step="0.01" value={form.price} onChange={(v) => setForm((f) => ({ ...f, price: v }))} />
              <NumberInput label="Cost" step="0.01" value={form.cost} onChange={(v) => setForm((f) => ({ ...f, cost: v }))} />
              <NumberInput label="Stock" min="0" value={form.stock} onChange={(v) => setForm((f) => ({ ...f, stock: v }))} />
              <NumberInput label="Low Stock Min" min="0" value={form.lowStock} onChange={(v) => setForm((f) => ({ ...f, lowStock: v }))} />
            </div>

            <div className="flex flex-wrap items-center gap-2">
              <Button type="submit" title="Add" />
            </div>

            <div className="text-xs text-slate-400">
              Initial stock is logged with user + date/time in Stock History (as a purchase).
            </div>
          </form>
        </Card>

        <Card title="Bulk / CSV Tools" icon={Plus}>
          <p className="text-xs text-slate-400 mb-2">
            Paste lines (<code>name, category, price, stock, lowStock, cost</code>) or import a CSV file
            (headers: name,category,price,cost,stock,lowStock). Paste/CSV will <b>merge by name</b>.
          </p>

          <textarea
            value={bulk}
            onChange={(e) => setBulk(e.target.value)}
            className="w-full h-28 border border-slate-700 bg-[#1E1E1E] text-white rounded-xl p-2"
            placeholder={`Lip Gloss, Makeup, 250, 52, 10, 200\nFace Powder, Makeup, 1200, 45, 8, 950`}
          />

          <div className="mt-2 flex flex-wrap gap-2">
            <Button onClick={parseBulk} title="Add From Lines" />
            <Button variant="secondary" onClick={exportProducts}>
              <Download className="w-4 h-4 mr-1" /> Export Products CSV
            </Button>
            <label className="px-3 py-2 rounded-xl text-sm font-medium bg-slate-700 hover:bg-slate-800 cursor-pointer inline-flex items-center gap-2">
              <Upload className="w-4 h-4" /> Import Products CSV
              <input ref={fileRef} onChange={handleImportFile} type="file" accept=".csv,text/csv" className="hidden" />
            </label>
          </div>
        </Card>

        <Card title="Inventory" icon={Package} className="lg:col-span-3">
          <div className="mb-3 flex flex-col sm:flex-row sm:items-end gap-2">
            <div className="flex-1">
              <TextInput
                label="Search inventory"
                value={invQuery}
                onChange={setInvQuery}
                placeholder="e.g. gloss makeup 250"
              />
            </div>
            {invQuery && (
              <Button variant="ghost" onClick={() => setInvQuery("")}>Clear</Button>
            )}
          </div>

          <div className="text-xs text-slate-400 mb-2">
            Showing <b>{filteredProducts.length}</b> of {state.products.length}
          </div>

          <div className="sm:hidden grid gap-2">
            {filteredProducts.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3">
                {invQuery ? "No products match your search" : "No products yet. Add some on the left or paste CSV lines."}
              </div>
            ) : (
              filteredProducts.map((r) => (
                <div key={r.id} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E]">
                  <div className="font-semibold text-white">{r.name}</div>
                  <div className="text-xs text-slate-400 mt-1">{r.category || "Uncategorized"}</div>
                  <div className="mt-2 grid grid-cols-2 gap-2 text-xs">
                    <div>Price: <span className="text-white">{state.settings.currency}{fmt(r.price ?? 0)}</span></div>
                    <div>Cost: <span className="text-white">{state.settings.currency}{fmt(r.cost ?? 0)}</span></div>
                    <div>Stock: <span className="text-white">{r.stock}</span></div>
                    <div>Min: <span className="text-white">{r.lowStock}</span></div>
                  </div>
                  <div className="text-[11px] text-slate-400 mt-2">
                    Last Update: {r.updatedAt ? niceDateTime(r.updatedAt) : "—"}
                  </div>
                  <div className="mt-2 flex items-center gap-2">
                    <Button variant="secondary" onClick={() => editProduct(r)}>
                      <Edit3 className="w-4 h-4" />
                    </Button>
                    {canDelete && (
                      <Button className="ml-auto" variant="danger" onClick={() => delProduct(r.id)}>
                        <Trash2 className="w-4 h-4" />
                      </Button>
                    )}
                  </div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "name", title: "Product" },
                { key: "category", title: "Category" },
                { key: "price", title: "Price", render: (r) => `${state.settings.currency}${fmt(r.price ?? 0)}` },
                { key: "cost", title: "Cost", render: (r) => `${state.settings.currency}${fmt(r.cost ?? 0)}` },
                { key: "stock", title: "Stock" },
                { key: "low", title: "Min", render: (r) => r.lowStock },
                { key: "updatedAt", title: "Last Update", render: (r) => (r.updatedAt ? niceDateTime(r.updatedAt) : "") },
                {
                  key: "actions",
                  title: "",
                  render: (r) => (
                    <div className="flex gap-2">
                      <Button variant="secondary" onClick={() => editProduct(r)}>
                        <Edit3 className="w-4 h-4" />
                      </Button>
                      {canDelete && (
                        <Button variant="danger" onClick={() => delProduct(r.id)}>
                          <Trash2 className="w-4 h-4" />
                        </Button>
                      )}
                    </div>
                  ),
                },
              ]}
              rows={filteredProducts}
              empty={invQuery ? "No products match your search" : "No products yet. Add some on the left or paste CSV lines."}
            />
          </div>
        </Card>
      </div>
    );
  }

  function EditProductPage({ state, setState, productId, canDelete, onBack }) {
    const p = state.products.find(x => x.id === productId);

    const [form, setForm] = useState(() => ({
      name: p?.name || "",
      category: p?.category || "",
      price: toNum(p?.price || 0),
      cost: toNum(p?.cost || 0),
      lowStock: toNum(p?.lowStock || state.settings.lowStockDefault),
      addStock: 0,
      purchaseDate: dateOnlyFromISO(nowISO()),
      purchaseUnitCost: toNum(p?.cost || 0),
      note: "",
    }));

    useEffect(() => {
      const pp = state.products.find(x => x.id === productId);
      if (!pp) return;
      setForm(f => ({
        ...f,
        name: pp.name || "",
        category: pp.category || "",
        price: toNum(pp.price || 0),
        cost: toNum(pp.cost || 0),
        lowStock: toNum(pp.lowStock || state.settings.lowStockDefault),
        purchaseUnitCost: toNum(pp.cost || 0),
      }));
    }, [productId, state.products.length]);

    if (!p) {
      return (
        <Card title="Edit Product" icon={Package}>
          <div className="text-slate-300">Product not found.</div>
          <div className="mt-3">
            <Button variant="secondary" onClick={onBack}>
              <ArrowLeft className="w-4 h-4 mr-1" /> Back
            </Button>
          </div>
        </Card>
      );
    }

    const hasChanges = useMemo(() => {
      const defaultPurchaseDate = dateOnlyFromISO(nowISO());

      const coreChanged =
        form.name.trim() !== String(p.name || "") ||
        form.category.trim() !== String(p.category || "") ||
        toNum(form.price) !== toNum(p.price || 0) ||
        toNum(form.cost) !== toNum(p.cost || 0) ||
        toNum(form.lowStock) !== toNum(p.lowStock || state.settings.lowStockDefault);

      const stockLoadChanged =
        Math.max(0, toNum(form.addStock || 0)) > 0 ||
        toNum(form.purchaseUnitCost || 0) !== toNum(p.cost || 0) ||
        String(form.purchaseDate || "").trim() !== defaultPurchaseDate ||
        String(form.note || "").trim() !== "";

      return coreChanged || stockLoadChanged;
    }, [form, p, state.settings.lowStockDefault]);

    async function saveChanges(e) {
      e.preventDefault();
      if (!form.name.trim()) return alert("Name required");

      const addQty = Math.max(0, toNum(form.addStock || 0));
      const stamp = nowISO();
      const user = state.currentUser?.username || "unknown";

      const purchaseDate = (form.purchaseDate || "").trim() || dateOnlyFromISO(stamp);
      const unitCost = toNum(form.purchaseUnitCost || 0);
      const totalCost = addQty > 0 ? (addQty * unitCost) : 0;

      let nextProducts;

      setState(s => {
        nextProducts = s.products.map(prod => {
          if (prod.id !== productId) return prod;

          const before = toNum(prod.stock);
          const after = before + addQty;

          const stockHistory = Array.isArray(prod.stockHistory) ? [...prod.stockHistory] : [];

          if (addQty > 0) {
            stockHistory.unshift({
              dateTime: stamp,
              user,
              qtyChange: addQty,
              note: (form.note?.trim() || "Stock added"),
              fromStock: before,
              toStock: after,
              type: "purchase",
              purchaseDate,
              unitCost,
              totalCost
            });
          }

          const updated = {
            ...prod,
            name: form.name.trim(),
            category: form.category.trim(),
            price: toNum(form.price),
            cost: toNum(form.cost),
            lowStock: toNum(form.lowStock) || state.settings.lowStockDefault,
            updatedAt: stamp,
            stock: after,
            stockHistory,
          };

          if (!updated.createdAt) updated.createdAt = stamp;
          return updated;
        });

        return { ...s, products: nextProducts };
      });

      try {
        await GSSvc.saveProducts(nextProducts);
        alert("Product updated");
        onBack();
      } catch (err) {
        showSyncError("Sync to Database (saveProducts)", err);
      }
    }

    async function deleteThis() {
      if (!canDelete) return;
      if (!confirm("Delete product?")) return;

      const next = state.products.filter(x => x.id !== productId);
      setState(s => ({ ...s, products: next }));

      try {
        await GSSvc.deleteProduct(productId);
        alert("Product deleted");
        onBack();
      } catch (err) {
        showSyncError("Sync to Database (deleteProduct)", err);
      }
    }

    const historyRows = (p.stockHistory || []).map(h => ({
      dateTime: h.dateTime ? new Date(h.dateTime).toLocaleString() : "",
      user: h.user || "",
      change: (h.qtyChange ?? 0),
      stock: `${h.fromStock ?? ""} → ${h.toStock ?? ""}`,
      purchaseDate: h.purchaseDate || "",
      unitCost: (h.unitCost ?? ""),
      totalCost: (h.totalCost ?? ""),
      note: h.note || "",
    }));

    return (
      <div className="grid gap-4">
        <div className="flex flex-wrap items-center justify-between gap-2">
          <div>
            <div className="text-xl font-semibold">Edit Product</div>
            <div className="text-xs text-slate-400 break-words">
              Created: {p.createdAt ? niceDateTime(p.createdAt) : "—"} • Last Update: {p.updatedAt ? niceDateTime(p.updatedAt) : "—"}

  // ------------------------------
  // Record Sale
  // ------------------------------
  function RecordSalePanel({ state, setState }) {
    const [cart, setCart] = useState([]);
    const [filter, setFilter] = useState("");
    const [saleDate, setSaleDate] = useState(dateOnlyFromISO(nowISO()));
    const cartDraftKey = useMemo(
      () => `monicz_exclusive_cart_draft_${String(state.currentUser?.username || "unknown").toLowerCase()}`,
      [state.currentUser?.username]
    );
    const cartDraftHydratedRef = useRef(false);

    useEffect(() => {
      cartDraftHydratedRef.current = false;
      try {
        const raw = localStorage.getItem(cartDraftKey);
        if (!raw) {
          setCart([]);
          setSaleDate(dateOnlyFromISO(nowISO()));
          cartDraftHydratedRef.current = true;
          return;
        }
        const parsed = JSON.parse(raw);
        const nextCart = Array.isArray(parsed?.cart) ? parsed.cart : [];
        const nextSaleDate = String(parsed?.saleDate || "").trim() || dateOnlyFromISO(nowISO());
        setCart(nextCart);
        setSaleDate(nextSaleDate);
      } catch {
        setCart([]);
        setSaleDate(dateOnlyFromISO(nowISO()));
      } finally {
        cartDraftHydratedRef.current = true;
      }
    }, [cartDraftKey]);

    useEffect(() => {
      if (!cartDraftHydratedRef.current) return;
      try {
        localStorage.setItem(cartDraftKey, JSON.stringify({ cart, saleDate }));
        window.dispatchEvent(new Event("cart-draft-updated"));
      } catch {}
    }, [cart, saleDate, cartDraftKey]);

    const products = useMemo(() => {
      const f = filter.trim().toLowerCase();
      return f
        ? state.products.filter((p) =>
            String(p.name || "").toLowerCase().includes(f) ||
            String(p.category || "").toLowerCase().includes(f)
          )
        : state.products;
    }, [state.products, filter]);

    const selectedProductIds = useMemo(() => new Set(cart.map((it) => it.productId)), [cart]);

    const total = cart.reduce((a, it) => a + it.qty * it.price, 0);

    function addToCart(p) {
      if (p.stock <= 0) return alert("Out of stock");
      setCart((c) => {
        const i = c.findIndex((x) => x.productId === p.id);
        if (i >= 0) {
          const next = [...c];
          next[i] = { ...next[i], qty: next[i].qty + 1 };
          return next;
        }
        return [...c, { productId: p.id, name: p.name, qty: 1, price: p.price || 0, cost: p.cost || 0 }];
      });
    }

    function updateQty(id, qty) {
      setCart((c) => c.map((x) => (x.productId === id ? { ...x, qty: Math.max(1, qty) } : x)));
    }

    function removeFromCart(id) {
      setCart((c) => c.filter((x) => x.productId !== id));
    }

    function clearCartDraft() {
      setCart([]);
      setSaleDate(dateOnlyFromISO(nowISO()));
      try { localStorage.removeItem(cartDraftKey); } catch {}
      window.dispatchEvent(new Event("cart-draft-updated"));
    }

    async function completeSale() {
      if (!cart.length) return alert("Cart is empty");

      for (const it of cart) {
        const p = state.products.find((p) => p.id === it.productId);
        if (!p || p.stock < it.qty) return alert(`Insufficient stock for ${it?.name}`);
      }

      const saleDateISO = new Date(`${saleDate}T00:00:00`).toISOString();
      const saleEntries = cart.map((it) => {
        const subtotal = it.qty * it.price;
        return {
          id: uid("s"),
          date: saleDateISO,
          items: [{ ...it, subtotal }],
          total: subtotal,
          user: state.currentUser.username,
        };
      });

      let updatedProducts;
      setState((s) => {
        const stamp = nowISO();
        const user = s.currentUser?.username || "unknown";

        updatedProducts = s.products.map((p) => {
          const line = cart.find((it) => it.productId === p.id);
          if (!line) return p;

          const before = toNum(p.stock);
          const after = before - line.qty;

          const stockHistory = Array.isArray(p.stockHistory) ? [...p.stockHistory] : [];
          stockHistory.unshift({
            dateTime: stamp,
            user,
            qtyChange: -line.qty,
            note: `Sale recorded (${line.name})`,
            fromStock: before,
            toStock: after,
            type: "sale",
          });

          return { ...p, stock: after, updatedAt: stamp, stockHistory };
        });

        return { ...s, sales: [...saleEntries, ...s.sales], products: updatedProducts };
      });

      clearCartDraft();

      try {
        await Promise.all([
          ...saleEntries.map((sale) => GSSvc.addSale(sale)),
          GSSvc.saveProducts(updatedProducts),
        ]);
        alert("Sale recorded");
      } catch (err) {
        showSyncError("Sync to Database (addSale/saveProducts)", err);
      }
    }

    return (
      <div className="grid lg:grid-cols-2 gap-4">
        <Card title="Pick Products" icon={ShoppingCart}>
          <div className="mb-2">
            <TextInput label="Search" value={filter} onChange={setFilter} placeholder="Name or category" />
          </div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-96 overflow-auto pr-1">
            {products.map((p) => {
              const selected = selectedProductIds.has(p.id);
              return (
                <button
                  key={p.id}
                  onClick={() => addToCart(p)}
                  style={{ WebkitTapHighlightColor: "transparent" }}
                  className={`border border-slate-700 rounded-xl p-2 text-left focus:outline-none focus:ring-0 active:ring-0 ${
                    selected
                      ? "bg-yellow-100 text-black font-semibold border-yellow-300"
                      : "hover:bg-slate-800 active:bg-yellow-100 active:text-black"
                  }`}
                >
                  <div className="font-medium">{p.name}</div>
                  <div className={`text-xs ${selected ? "text-black" : "text-slate-400"}`}>{p.category || "Uncategorized"}</div>
                  <div className={`text-xs ${selected ? "text-black" : ""}`}>
                    Price: {state.settings.currency}{fmt(p.price || 0)} • Stock: {p.stock}
                  </div>
                </button>
              );
            })}
            {products.length === 0 && <div className="text-sm text-slate-400">No products available.</div>}
          </div>
        </Card>

        <Card title="Cart & Checkout" icon={Wallet}>
          <div className="sm:hidden grid gap-2">
            {cart.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3">
                No items in cart
              </div>
            ) : (
              cart.map((r) => (
                <div key={r.productId} className="bg-yellow-100 text-black border border-yellow-200 rounded-xl p-2.5">
                  <div className="flex items-start justify-between gap-2">
                    <div className="font-semibold text-sm leading-tight break-words">{r.name}</div>
                    <div className="text-xs font-semibold whitespace-nowrap">{state.settings.currency}{fmt(r.qty * (r.price || 0))}</div>
                  </div>
                  <div className="mt-1 flex items-center justify-between text-xs">
                    <span>Price: <span className="font-medium">{state.settings.currency}{fmt(r.price || 0)}</span></span>
                    <span>Qty:</span>
                    <input
                      type="number"
                      className="w-16 border border-slate-400 bg-white text-black rounded-lg px-2 py-0.5"
                      value={r.qty}
                      onChange={(e) => updateQty(r.productId, Number(e.target.value))}
                    />
                    <Button variant="danger" onClick={() => removeFromCart(r.productId)}>
                      <Trash2 className="w-4 h-4" />
                    </Button>
                  </div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "name", title: "Item" },
                { key: "qty", title: "Qty", render: (r) => (
                  <input
                    type="number"
                    className="w-20 border border-slate-700 bg-[#1E1E1E] text-white rounded-lg px-2 py-1"
                    value={r.qty}
                    onChange={(e) => updateQty(r.productId, Number(e.target.value))}
                  />
                )},
                { key: "price", title: "Price", render: (r) => `${state.settings.currency}${fmt(r.price || 0)}` },
                { key: "subtotal", title: "Subtotal", render: (r) => `${state.settings.currency}${fmt(r.qty * (r.price || 0))}` },
                { key: "actions", title: "", render: (r) => (
                  <Button variant="danger" onClick={() => removeFromCart(r.productId)}>
                    <Trash2 className="w-4 h-4" />
                  </Button>
                )},
              ]}
              rows={cart}
              rowClassName={() => "bg-yellow-100 text-black"}
              empty="No items in cart"
            />
          </div>
          <div className="grid gap-3 md:grid-cols-2 md:items-end">
            <label className="block">
              <span className="text-xs text-gray-300">Sale Date</span>
              <div className="relative mt-1">
                <input
                  type="date"
                  className="w-full rounded-xl border border-slate-600 bg-[#1E1E1E] text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  value={saleDate}
                  onChange={(e) => setSaleDate(e.target.value)}
                />
              </div>
            </label>
            <div className="mt-1 flex items-center justify-between md:justify-end">
              <div className="text-sm">Total:</div>
              <div className="text-lg font-semibold">{state.settings.currency}{fmt(total)}</div>
            </div>
          </div>
          <div className="mt-3 flex gap-2">
            <Button onClick={completeSale} title="Complete Sale" />
            <Button variant="ghost" onClick={clearCartDraft} title="Clear" />
          </div>
        </Card>
      </div>
    );
  }

  function SalesHistoryPanel({ state }) {
    const [range, setRange] = useState("30");
    const [filterDate, setFilterDate] = useState("");
    const filtered = useMemo(() => {
      let filtered = state.sales.filter((s) => withinDays(s.date, Number(range) || 3650));
      if (filterDate) {
        const targetDate = new Date(filterDate);
        const start = new Date(targetDate);
        start.setHours(0,0,0,0);
        const end = new Date(targetDate);
        end.setHours(23,59,59,999);
        filtered = filtered.filter(s => {
          const d = new Date(s.date);
          return d >= start && d <= end;
        });
      }
      return filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
    }, [state.sales, range, filterDate]);

    return (
      <div className="grid gap-4">
        <Card title="Filters" icon={History}>
          <div className="flex flex-col sm:flex-row sm:items-end gap-3">
            <div className="w-full sm:max-w-[220px]">
              <NumberInput label="Last N days" value={Number(range)} onChange={(v) => setRange(String(v))} />
            </div>
            <label className="block w-full sm:max-w-[200px]">
              <span className="text-xs text-gray-300">Filter by Date (optional)</span>
              <div className="relative mt-1">
                <input
                  type="date"
                  className="w-full rounded-xl border border-slate-600 bg-[#1E1E1E] text-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  value={filterDate}
                  onChange={(e) => setFilterDate(e.target.value)}
                />
              </div>
            </label>
            <ExportCSV
              filename="sales.csv"
              rows={filtered}
              mapRow={(s) => ({
                id: s.id,
                date: s.date,
                total: s.total,
                items: (s.items || []).map((i) => `${i.name} x${i.qty}`).join("; "),
                user: s.user
              })}
            />
          </div>
        </Card>

        <Card title="Sales" icon={ShoppingCart}>
          <div className="sm:hidden grid gap-2">
            {filtered.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3">No sales yet</div>

              filtered.map((r) => (
                <div key={r.id} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E]">
                  <div className="text-xs text-slate-400">{new Date(r.date).toLocaleString()}</div>
                  <div className="mt-1 text-sm">User: <span className="font-medium text-white">{r.user || "—"}</span></div>
                  <div className="mt-1 text-xs text-slate-300">{(r.items || []).map((i) => `${i.name} x${i.qty}`).join(", ") || "No items"}</div>
                  <div className="mt-2 text-sm font-semibold">Total: {state.settings.currency}{fmt(r.total)}</div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "date", title: "Date", render: (r) => new Date(r.date).toLocaleString() },
                { key: "user", title: "User" },
                { key: "items", title: "Items", render: (r) => (r.items || []).map((i) => `${i.name} x${i.qty}`).join(", ") },
                { key: "total", title: "Total", render: (r) => `${state.settings.currency}${fmt(r.total)}` },

  function ClientSalesHistoryPanel({ state }) {
    const allSales = useMemo(() => state.sales, [state.sales]);

    const [mode, setMode] = useState("date");
    const [selectedDate, setSelectedDate] = useState(dateOnlyFromISO(nowISO()));
    const [selectedWeek, setSelectedWeek] = useState(getISOWeekString(new Date()));
    const [selectedMonth, setSelectedMonth] = useState(`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,"0")}`);

    const { rows, title } = useMemo(() => {
      let start = null;
      let end = null;
      let titleText = "";

      if (mode === "date") {
        start = new Date(`${selectedDate}T00:00:00`);
        end = new Date(`${selectedDate}T23:59:59.999`);
        titleText = `Sales for ${selectedDate}`;
      } else if (mode === "week") {
        const r = getDateRangeFromWeekString(selectedWeek);
        start = r.start;
        end = r.end;
        titleText = `Sales for Week ${selectedWeek}`;
      } else {
        const [y, m] = String(selectedMonth || "").split("-");
        const yr = Number(y);
        const mo = Number(m) - 1;
        start = new Date(yr, mo, 1, 0,0,0,0);
        end = new Date(yr, mo + 1, 0, 23,59,59,999);
        titleText = `Sales for ${selectedMonth}`;
      }

      const filtered = allSales.filter((s) => {
        const d = new Date(s.date);
        return start && end && d >= start && d <= end;
      });

      return { rows: filtered.sort((a, b) => new Date(b.date) - new Date(a.date)), title: titleText };
    }, [mode, selectedDate, selectedWeek, selectedMonth, allSales]);

    const total = rows.reduce((a, s) => a + (Number(s.total) || 0), 0);

            )}

            {mode === "month" && (
              <TextInput label="Select Month" type="month" value={selectedMonth} onChange={setSelectedMonth} />
            )}

            <div className="md:col-span-2 flex items-end">
              <ExportCSV
                filename="client-sales-report.csv"
                rows={rows}
                mapRow={(s) => ({
                  id: s.id,
                  date: s.date,
                  total: s.total,
                  items: (s.items || []).map((i) => `${i.name} x${i.qty}`).join("; "),
                  user: s.user
                })}
              />
            </div>
          </div>

          <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
            <KPI label="Transactions" value={rows.length} />
            <KPI label="Total Sales" value={`${state.settings.currency}${fmt(total)}`} />
          </div>

          <div className="mt-3 text-xs text-slate-400">
            Default date report is set to today.
          </div>
        </Card>

        <Card title={title} icon={ShoppingCart}>
          <div className="sm:hidden grid gap-2">
            {rows.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3">No sales found for this report.</div>
            ) : (
              rows.map((r) => (
                <div key={r.id} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E]">
                  <div className="text-xs text-slate-400">{new Date(r.date).toLocaleString()}</div>

                  <div className="mt-2 text-sm font-semibold">Total: {state.settings.currency}{fmt(r.total)}</div>
                </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "date", title: "Date", render: (r) => new Date(r.date).toLocaleString() },
                { key: "user", title: "User" },
