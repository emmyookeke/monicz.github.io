              ]}
              rows={rows}
              empty="No sales found for this report."
            />
          </div>
        </Card>
      </div>
    );
  }

  function ExportCSV({ filename, rows, mapRow }) {
    function download() {
      if (!rows.length) return alert("No data to export");
      const data = rows.map(mapRow);
      const headers = Object.keys(data[0] || { example: "no_data" });
      const csv = [headers.join(","), ...data.map((r) => headers.map((h) => JSON.stringify(r[h] ?? "")).join(","))].join("\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
    return (
      <Button onClick={download} variant="secondary">
        <Download className="w-4 h-4 mr-1" /> Export CSV
      </Button>
    );
  }

  // ------------------------------
  // Expenses
  // ------------------------------
  function ExpensesPanel({ state, setState, onlyMine = false }) {
    const expenseCategoryOptions = [
      "Transportation",
      "Fuel",
      "Internet/Data",
      "Electricity/Utilities",
      "Rent",
      "Packaging",
      "Office Supplies",
      "Repairs/Maintenance",
      "Marketing/Ads",
      "Staff Refreshments",
    ];

    const [form, setForm] = useState({
      amount: 0,
      category: expenseCategoryOptions[0],
      categoryOther: "",
      note: ""
    });

    async function addExpense(e) {
      e.preventDefault();
      if (!form.amount) return alert("Enter amount");

      const otherText = String(form.categoryOther || "").trim();
      const finalCategory = form.category === "Others"
        ? `Others - ${otherText}`
        : form.category;

      if (!finalCategory) return alert("Please specify category for Others");

      const exp = {
        id: uid("e"),
        date: nowISO(),
        amount: Number(form.amount),
        category: finalCategory,
        note: form.note,
        user: state.currentUser?.username || "unknown"
      };

      setState((s) => ({ ...s, expenses: [exp, ...s.expenses] }));
      setForm({ amount: 0, category: expenseCategoryOptions[0], categoryOther: "", note: "" });

      try {
        await GSSvc.addExpense(exp);
      } catch (err) {
        showSyncError("Sync to Database (addExpense)", err);
      }
    }

    const visibleExpenses = useMemo(() => {
      if (!onlyMine) {
        return [...state.expenses].sort((a, b) => new Date(b.date) - new Date(a.date));
      }
      const me = String(state.currentUser?.username || "").toLowerCase();
      return state.expenses
        .filter(e => String(e.user || "").toLowerCase() === me)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    }, [state.expenses, state.currentUser, onlyMine]);

    const total = visibleExpenses.reduce((a, e) => a + (Number(e.amount) || 0), 0);

    return (
      <div className="grid lg:grid-cols-2 gap-4">
        <Card title="Record Expense" icon={Wallet}>
          <form onSubmit={addExpense} className="grid gap-3">
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <NumberInput label="Amount" step="0.01" value={form.amount} onChange={(v) => setForm((f) => ({ ...f, amount: v }))} />
              <label className="block">
                <span className="text-xs text-gray-300">Category</span>
                <select
                  value={form.category}
                  onChange={(e) => setForm((f) => ({ ...f, category: e.target.value, categoryOther: e.target.value === "Others" ? f.categoryOther : "" }))}
                  className="mt-1 w-full rounded-xl border border-slate-600 bg-[#1E1E1E] text-white px-3 py-2"
                >
                  {expenseCategoryOptions.map((opt) => (
                    <option key={opt} value={opt}>{opt}</option>
                  ))}
                  <option value="Others">Others</option>
                </select>
              </label>
              <TextInput label="Note" value={form.note} onChange={(v) => setForm((f) => ({ ...f, note: v }))} />
            </div>

            {form.category === "Others" && (
              <TextInput
                label="Specify Category"
                value={form.categoryOther}
                onChange={(v) => setForm((f) => ({ ...f, categoryOther: v }))}
                placeholder="Enter custom expense category"
              />
            )}
            <Button type="submit" title="Add Expense" />
          </form>
        </Card>

        <Card title={`Expenses • Total: ${state.settings.currency}${fmt(total)}`} icon={FileText}>
          <div className="sm:hidden grid gap-2">
            {visibleExpenses.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3">No expenses yet</div>
            ) : (
              visibleExpenses.map((r) => (
                <div key={r.id} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E]">
                  <div className="text-xs text-slate-400">{new Date(r.date).toLocaleString()}</div>
                  <div className="mt-1 text-sm">User: <span className="font-medium text-white">{r.user || "—"}</span></div>
                  <div className="mt-1 text-sm">Category: <span className="text-white">{r.category || "—"}</span></div>
                  <div className="mt-1 text-xs text-slate-300">{r.note || "No note"}</div>
                  <div className="mt-2 text-sm font-semibold">Amount: {state.settings.currency}{fmt(r.amount)}</div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "date", title: "Date", render: (r) => new Date(r.date).toLocaleString() },
                { key: "user", title: "User" },
                { key: "category", title: "Category" },
                { key: "note", title: "Note" },
                { key: "amount", title: "Amount", render: (r) => `${state.settings.currency}${fmt(r.amount)}` },
              ]}
              rows={visibleExpenses}
              empty="No expenses yet"
            />
          </div>
        </Card>
      </div>
    );
  }

  // ------------------------------
  // Reports
  // ------------------------------
  function ReportsPanel({ state, setState }) {
    const monthlySalesChartRef = useRef(null);
    const monthlyProfitChartRef = useRef(null);

    const monthlyMap = {};
    state.sales.forEach(s => {
      const d = new Date(s.date);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      if(!monthlyMap[key]) monthlyMap[key] = { revenue:0, cogs:0 };
      monthlyMap[key].revenue += s.total;
      (s.items||[]).forEach(i => {
        monthlyMap[key].cogs += i.qty * (i.cost||0);
      });
    });

    const months = Object.keys(monthlyMap).sort();
    const monthlyRevenue = months.map(m => monthlyMap[m].revenue);
    const monthlyProfit = months.map(m => monthlyMap[m].revenue - monthlyMap[m].cogs);

    useEffect(() => {
      if(!monthlySalesChartRef.current || !monthlyProfitChartRef.current) return;

      Chart.getChart(monthlySalesChartRef.current)?.destroy();
      Chart.getChart(monthlyProfitChartRef.current)?.destroy();

      new Chart(monthlySalesChartRef.current, {
        type:"bar",
        data:{ labels:months, datasets:[{ label:"Monthly Sales", data:monthlyRevenue }] }
      });

      new Chart(monthlyProfitChartRef.current, {
        type:"bar",
        data:{ labels:months, datasets:[{ label:"Monthly Profit", data:monthlyProfit }] }
      });
    }, [state.sales]);

    const [yearForm, setYearForm] = useState({ year:"", revenue:0, cogs:0, expenses:0 });

    async function addYear(){
      if(!yearForm.year){ alert("Enter year"); return; }
      const newYear = { id: uid("y"), year: yearForm.year, revenue: Number(yearForm.revenue), cogs: Number(yearForm.cogs), expenses: Number(yearForm.expenses) };
      let nextYears;
      setState(s => { nextYears = [...(s.historicalYears || []), newYear]; return { ...s, historicalYears: nextYears }; });
      try{ await GSSvc.saveYears(nextYears); alert("Year saved to Database"); }catch(err){ console.error(err); alert("Save to Database Failed"); }
      setYearForm({ year:"", revenue:0, cogs:0, expenses:0 });
    }

    const historical = state.historicalYears || [];
    const pastRevenue = historical.reduce((a,y)=>a+y.revenue,0);
    const pastCOGS = historical.reduce((a,y)=>a+y.cogs,0);
    const pastExpenses = historical.reduce((a,y)=>a+y.expenses,0);

    const inventoryRows = state.products.map((p) => ({
      id: p.id,
      name: p.name,
      category: p.category,
      price: p.price,
      cost: p.cost || 0,
      stock: p.stock,
      value: (p.price || 0) * (p.stock || 0),
      createdAt: p.createdAt || "",
      updatedAt: p.updatedAt || "",
    }));
    const inventoryValue = inventoryRows.reduce((a, r) => a + r.value, 0);

    const revenue = state.sales.reduce((a, s) => a + s.total, 0);
    const cogs = state.sales.reduce((acc, s) => acc + (s.items || []).reduce((aa, it) => aa + (it.qty * (it.cost || 0)), 0), 0);
    const salesProfit = revenue - cogs;
    const expenseTotal = state.expenses.reduce((a, e) => a + (Number(e.amount) || 0), 0);
    const netProfit = salesProfit - expenseTotal;

    const lifetimeRevenue = revenue + pastRevenue;
    const lifetimeCOGS = cogs + pastCOGS;
    const lifetimeExpenses = expenseTotal + pastExpenses;
    const lifetimeProfit = (lifetimeRevenue - lifetimeCOGS) - lifetimeExpenses;

    const purchasesMap = {};
    state.products.forEach(prod => {
      (prod.stockHistory || []).forEach(h => {
        const qty = Number(h.qtyChange) || 0;
        if (qty <= 0) return;
        const purchaseDate = (h.purchaseDate || dateOnlyFromISO(h.dateTime) || "").trim();
        if (!purchaseDate) return;

        const unitCost = Number(h.unitCost);
        const fallbackUnitCost = Number.isFinite(unitCost) ? unitCost : (Number(prod.cost) || 0);
        const totalCost = Number.isFinite(Number(h.totalCost)) ? Number(h.totalCost) : (qty * fallbackUnitCost);

        if (!purchasesMap[purchaseDate]) purchasesMap[purchaseDate] = { date: purchaseDate, qty: 0, amount: 0, lines: 0 };
        purchasesMap[purchaseDate].qty += qty;
        purchasesMap[purchaseDate].amount += totalCost;
        purchasesMap[purchaseDate].lines += 1;
      });
    });

    const purchaseRows = Object.values(purchasesMap).sort((a,b)=> (a.date < b.date ? 1 : -1));

    function exportPurchasesCSV() {
      if (!purchaseRows.length) return alert("No purchase data to export");
      const csv = csvStringify(purchaseRows.map(r => ({
        purchaseDate: r.date,
        totalQty: r.qty,
        totalAmount: r.amount,
        entries: r.lines
      })));
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "stock_purchases_by_date.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    return (
      <div className="grid gap-4">
        <Card title="Inventory Report" icon={Package}>
          <div className="mb-2 text-sm">Total inventory value: <b>{state.settings.currency}{fmt(inventoryValue)}</b></div>
          <ExportCSV filename="inventory.csv" rows={inventoryRows} mapRow={(r) => r} />
        </Card>

        <Card title="Stock Purchases Report (By Date of Purchase)" icon={History}>
          <div className="text-xs text-slate-400 mb-2">
            Totals are calculated from Stock History entries where stock was added (qty change &gt; 0).
          </div>
          <div className="flex flex-wrap gap-2 mb-3 justify-center sm:justify-start">
            <Button variant="secondary" onClick={exportPurchasesCSV}>
              <Download className="w-4 h-4 mr-1" /> Export Purchases CSV
            </Button>
          </div>
          <div className="sm:hidden grid gap-2 text-center">
            {purchaseRows.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3 text-center">
                No purchase entries yet. Add stock with a purchase date in Edit Product.
              </div>
            ) : (
              purchaseRows.map((r) => (
                <div key={r.date} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E] text-center">
                  <div className="font-semibold">{r.date}</div>
                  <div className="mt-1 text-xs text-slate-300">Total Qty: {r.qty}</div>
                  <div className="text-xs text-slate-300">Entries: {r.lines}</div>
                  <div className="mt-2 text-sm font-semibold">Amount: {state.settings.currency}{fmt(r.amount)}</div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                { key: "date", title: "Purchase Date" },
                { key: "qty", title: "Total Qty" },
                { key: "amount", title: "Total Amount", render: (r) => `${state.settings.currency}${fmt(r.amount)}` },
                { key: "lines", title: "Entries" },
              ]}
              rows={purchaseRows}
              empty="No purchase entries yet. Add stock with a purchase date in Edit Product."
            />
          </div>
        </Card>

        <Card title="Profit Summary" icon={Wallet}>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 text-center">
            <KPI label="Revenue" value={`${state.settings.currency}${fmt(revenue)}`} />
            <KPI label="COGS" value={`${state.settings.currency}${fmt(cogs)}`} />
            <KPI label="Sales Profit" value={`${state.settings.currency}${fmt(salesProfit)}`} />
            <KPI label="Net Profit" value={`${state.settings.currency}${fmt(netProfit)}`} />
          </div>
          <div className="text-xs text-slate-400 mt-2 text-center">
            Net Profit = Sales Profit − Expenses ({state.settings.currency}{fmt(expenseTotal)})
          </div>
        </Card>

        <Card title="Historical Summary" icon={History}>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 text-center">
            <KPI label="Revenue" value={`${state.settings.currency}${fmt(pastRevenue)}`} />
            <KPI label="COGS" value={`${state.settings.currency}${fmt(pastCOGS)}`} />
            <KPI label="Expenses" value={`${state.settings.currency}${fmt(pastExpenses)}`} />
            <KPI label="Profit" value={`${state.settings.currency}${fmt(pastRevenue - pastCOGS - pastExpenses)}`} />
          </div>
        </Card>

        <Card title="Lifetime Summary" icon={Wallet}>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 text-center">
            <KPI label="Revenue" value={`${state.settings.currency}${fmt(lifetimeRevenue)}`} />
            <KPI label="COGS" value={`${state.settings.currency}${fmt(lifetimeCOGS)}`} />
            <KPI label="Expenses" value={`${state.settings.currency}${fmt(lifetimeExpenses)}`} />
            <KPI label="Profit" value={`${state.settings.currency}${fmt(lifetimeProfit)}`} />
          </div>
        </Card>

        <Card title="Add Previous Year" icon={History}>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <TextInput label="Year" value={yearForm.year} onChange={(v)=>setYearForm(f=>({...f,year:v}))}/>
            <NumberInput label="Revenue" value={yearForm.revenue} onChange={(v)=>setYearForm(f=>({...f,revenue:v}))}/>
            <NumberInput label="COGS" value={yearForm.cogs} onChange={(v)=>setYearForm(f=>({...f,cogs:v}))}/>
            <NumberInput label="Expenses" value={yearForm.expenses} onChange={(v)=>setYearForm(f=>({...f,expenses:v}))}/>
          </div>
          <div className="mt-3">
            <Button onClick={addYear}>Save Year</Button>
          </div>
        </Card>

        <Card title="Historical Years" icon={FileText}>
          <div className="sm:hidden grid gap-2 text-center">
            {historical.length === 0 ? (
              <div className="text-sm text-slate-400 border border-slate-700 rounded-xl p-3 text-center">No historical years yet</div>
            ) : (
              historical.map((y) => (
                <div key={y.id || y.year} className="border border-slate-700 rounded-xl p-3 bg-[#1E1E1E] text-center">
                  <div className="font-semibold">Year: {y.year}</div>
                  <div className="mt-1 text-xs text-slate-300">Revenue: {state.settings.currency}{fmt(y.revenue)}</div>
                  <div className="text-xs text-slate-300">COGS: {state.settings.currency}{fmt(y.cogs)}</div>
                  <div className="text-xs text-slate-300">Expenses: {state.settings.currency}{fmt(y.expenses)}</div>
                  <div className="mt-2 text-sm font-semibold">Profit: {state.settings.currency}{fmt(y.revenue - y.cogs - y.expenses)}</div>
                </div>
              ))
            )}
          </div>

          <div className="hidden sm:block">
            <Table
              columns={[
                {key:"year",title:"Year"},
                {key:"revenue",title:"Revenue"},
                {key:"cogs",title:"COGS"},
                {key:"expenses",title:"Expenses"},
                {key:"profit",title:"Profit"}
              ]}
              rows={historical.map(y=>({
                year:y.year,
                revenue:`${state.settings.currency}${fmt(y.revenue)}`,
                cogs:`${state.settings.currency}${fmt(y.cogs)}`,
                expenses:`${state.settings.currency}${fmt(y.expenses)}`,
                profit:`${state.settings.currency}${fmt(y.revenue-y.cogs-y.expenses)}`
              }))}
            />
          </div>
        </Card>

        <Card title="Monthly Sales Chart" icon={BarChart3}>
          <canvas ref={monthlySalesChartRef}></canvas>
        </Card>

        <Card title="Monthly Profit Chart" icon={Wallet}>
          <canvas ref={monthlyProfitChartRef}></canvas>
        </Card>
      </div>
    );
  }

  // ------------------------------
  // Client App
  // ------------------------------
  function ClientApp({ state, setState }) {
    const [tab, setTab] = useState("dashboard");
    const [cartBadgeCount, setCartBadgeCount] = useState(() => getCartDraftItemCount(state.currentUser?.username));
    const me = String(state.currentUser?.username || "").toLowerCase();

    const allSales = useMemo(() => state.sales, [state.sales]);

    const myExpenses = useMemo(
      () => state.expenses.filter(e => String(e.user || "").toLowerCase() === me),
      [state.expenses, me]
    );

    const dailySales = useMemo(() => {
      const start = startOfToday();
      return allSales.filter(s => new Date(s.date) >= start).reduce((a, s) => a + (Number(s.total) || 0), 0);
    }, [allSales]);

    const weeklySales = useMemo(() => {
      const start = startOfWeek();
      const end = endOfWeek();
      return allSales
        .filter(s => {
          const d = new Date(s.date);
          return d >= start && d <= end;
        })
        .reduce((a, s) => a + (Number(s.total) || 0), 0);
    }, [allSales]);

    const monthlySales = useMemo(() => {
      const start = startOfMonth();
      const end = endOfMonth();
      return allSales
        .filter(s => {
          const d = new Date(s.date);
          return d >= start && d <= end;
        })
        .reduce((a, s) => a + (Number(s.total) || 0), 0);
    }, [allSales]);

    const myExpenseTotal = useMemo(
      () => myExpenses.reduce((a, e) => a + (Number(e.amount) || 0), 0),
      [myExpenses]
    );

   
    const totals = useMemo(() => {
    const lowStock = state.products.filter(
      (p) => (p.stock || 0) <= (p.lowStock || state.settings.lowStockDefault)
    );

    return { lowStock };
  }, [state.products, state.settings.lowStockDefault]);

    useEffect(() => {
      function refreshCount() {
        setCartBadgeCount(getCartDraftItemCount(state.currentUser?.username));
      }
      refreshCount();
      window.addEventListener("cart-draft-updated", refreshCount);
      window.addEventListener("focus", refreshCount);
      return () => {
        window.removeEventListener("cart-draft-updated", refreshCount);
        window.removeEventListener("focus", refreshCount);
      };
    }, [state.currentUser?.username]);


    return (
      <div className="max-w-6xl mx-auto px-4 py-6">
        <nav className="grid grid-cols-2 gap-2 mb-4 sm:flex sm:flex-wrap">
          <TabButton icon={BarChart3} label="Dashboard" active={tab === "dashboard"} onClick={() => setTab("dashboard")} />
          <TabButton
            icon={ShoppingCart}
            label={
              <span className="inline-flex items-center gap-2">
                <span>Record Sale</span>
                {cartBadgeCount > 0 && (
                  <span className="inline-flex items-center justify-center min-w-[20px] h-5 px-1 rounded-full bg-yellow-300 text-black text-[11px] font-bold">
                    {cartBadgeCount}
                  </span>
                )}
              </span>
            }
            active={tab === "sell"}
            onClick={() => setTab("sell")}
          />
          <TabButton icon={Wallet} label="Expenses" active={tab === "expenses"} onClick={() => setTab("expenses")} />
          <TabButton icon={History} label="Sales History" active={tab === "sales"} onClick={() => setTab("sales")} />
        </nav>

        {tab === "dashboard" && (
          <div className="grid gap-4">
            <Card title="Dashboard Overview" icon={Wallet}>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                <KPI label="Daily Sales" value={`${state.settings.currency}${fmt(dailySales)}`} />
                <KPI label="Weekly Sales" value={`${state.settings.currency}${fmt(weeklySales)}`} />
                <KPI label="Monthly Sales" value={`${state.settings.currency}${fmt(monthlySales)}`} />
                <KPI label="My Expenses" value={`${state.settings.currency}${fmt(myExpenseTotal)}`} />
              </div>
            </Card>

            <Card title="Low Stock Alerts" icon={AlertTriangle} className="md:col-span-2">
              <div className="text-xs text-slate-400 mb-2">
                Showing <b>{totals.lowStock.length}</b> item(s) that are low or out of stock.
              </div>

              <Table
                columns={[
                  { key: "name", title: "Product" },
                  { key: "stock", title: "Stock" },
                  { key: "low", title: "Min" },
                ]}
                rows={totals.lowStock.map((p) => ({
                  name: p.name,
                  stock: p.stock,
                  low: p.lowStock || state.settings.lowStockDefault
                }))}
                empty="No low stock items"
              />
            </Card>
          </div>
        )}

        {tab === "sell" && <RecordSalePanel state={state} setState={setState} />}
        {tab === "expenses" && <ExpensesPanel state={state} setState={setState} onlyMine={true} />}
        {tab === "sales" && <ClientSalesHistoryPanel state={state} />}
      </div>
    );
  }
